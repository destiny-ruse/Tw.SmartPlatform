schema_version: 1.0.0
id: backend.capability.remote-service
kind: capability
name: 远程服务调用能力
status: active
summary: 提供服务间调用、客户端代理、接口转发和远程服务集成支持能力。
owners:
  - platform
tags:
  - backend
  - dotnet
  - service-integration
  - remote-call
domain: integration
provided_by:
  modules:
    - backend.dotnet.building-blocks.remote-service
reuse:
  use_when:
    - 需要调用其他微服务公开接口
    - 需要封装服务间客户端代理
  do_not_reimplement:
    - 不要在业务服务中手写一套远程调用客户端工厂
    - 不要绕过统一超时、追踪和错误处理策略
aliases:
  - 远程调用
  - 服务间调用
  - 客户端代理
standards:
  - rules.auth-oauth-oidc#rules
  - rules.resilience#rules
  - rules.tracing#rules
source:
  declared_in: docs/knowledge/graph/capabilities/backend.capability.remote-service.yaml
  evidence:
    - backend/dotnet/BuildingBlocks/src/Tw.RemoteService/README.md
provenance:
  created_by: human
  created_at: 2026-04-27
  updated_by: human
  updated_at: 2026-04-27
