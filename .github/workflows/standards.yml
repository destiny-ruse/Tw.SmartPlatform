name: Standards

on:
  push:
  pull_request:

jobs:
  standards:
    name: Validate engineering standards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run standards checks
        run: python tools/standards/standards.py check
